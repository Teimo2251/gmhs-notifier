name: 경기경영고 대회 체크

on:
  schedule:
    - cron: '0 22 * * *'   # 매일 한국시간 오전 7시
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 패키지 설치
        run: pip install requests beautifulsoup4
      
      - name: 대회 체크 실행
        run: python scraper.py
